
num_gpus: 1
num_workers: 4
num_machines: 1
seed: 42

output_dir: /mnt/homeGPU/jmartin/entorno_jose/results/tumor_resnet50

dataset:
  name: Tumor
  root: /mnt/homeGPU/isevillano/Github/GleasonMap/Data/TrainTest
  num_classes: 14       
  image_size: 224 
  pre_size: 256
  interpolation: bilinear
  normalization_type: imagenet
  num_workers: 4
  num_gpus: 1
  num_machines: 1
  split_names: [train, val]

  train:
    dataset_class: ImglistDataset
    data_dir: /mnt/homeGPU/isevillano/Github/GleasonMap/Data/TrainTest/train
    imglist_pth: /mnt/homeGPU/jmartin/entorno_jose/train.txt
    batch_size: 64
    shuffle: True

  val:
    dataset_class: ImglistDataset
    data_dir: /mnt/homeGPU/isevillano/Github/GleasonMap/Data/TrainTest/val
    imglist_pth: /mnt/homeGPU/jmartin/entorno_jose/val.txt
    batch_size: 64
    shuffle: False

  

network:
  name: resnet50
  num_classes: 14
  pretrained: True
  checkpoint: /mnt/homeGPU/jmartin/entorno_jose/resnet50_imagenet_no_fc.ckpt
  num_gpus: 1
preprocessor:
  name: base

trainer:
  name: train
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.0005
    num_epochs: 50
  scheduler:
    name: cosine_annealing
    T_max: 50
  loss: cross_entropy
  batch_size: 64
  
evaluator:
  name: base

recorder:
  name: base
  save_all: False